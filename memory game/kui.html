<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Memory Game</title>
  <style>
    /* Basic page styling */
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #1e3c72, rgb(42, 82, 152));
      font-family: "Poppins", sans-serif;
      color: #fff;
      margin: 0;
    }

    h1 {
      margin-bottom: 20px;
      letter-spacing: 2px;
    }

    /* Game grid */
    .game-board {
      display: grid;
      grid-template-columns:4fr 4fr 4fr 4fr;
      gap: 15px;
      perspective: 1000px; /* gives 3D flipping effect */
    }
    .game-board.flex{
      display: flex;
      justify-content: center;
      align-items: center;
    }
    /* Each card */
    .card {
      width: 100px;
      height: 100px;
      position: relative;
      transform-style:preserve-3d ;
      transition:  0.3s;
      cursor: pointer;
    }

    /* When card is flipped */
    .card.flip {
      transform: rotateY(180deg);
      
      
    }
    .card.sc{
      scale: 1.1;
    }

    /* Card sides */
    .front, .back {
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 10px;
      backface-visibility: hidden; /* hides back when flipped */
      transition: 300ms;
    }

    .front {
      background: rgb(0, 212, 255);
      border: 2px rgb(10, 38, 71) solid;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 35px;
      color: #333;
      transform: rotateY(180deg);
      
    }
    .back:hover{
      background-color: #00d4ff;
      border: #0a2647 2px solid;
    }

    .back {
      background: #0a2647;
      border: 2px solid #00d4ff;
    }

    /* Restart button */
    button {
      margin-top: 20px;
      background: #00d4ff;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
      color: #0a2647;
      font-weight: 900;
      transition: 0.3s;
    }

    button:hover {
      background: #fff;
      color: #1e3c72;
    }
    .fg{
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
      
      margin-bottom: 15px;
    }
    @media (max-width:450px){
      .front{font-size: 29px;}
      .card{
        width: 65px;
        height: 65px;
      }
    }
    @media (max-width:315px){
      .front{font-size: 23px;}
      .card{
        width: 47px;
        height: 47px;
      }
      h1{
        font-size: 26px;
      }
      span{font-size: 18px;}
    }
  </style>
</head>
<body>
  <div class="fg">
  <span id="h3" style="font-size: 23px;">Score: 0</span>
  <span id="span" style="font-size: 23px; margin-bottom: 5px; color: #ffdd57;">moves: 0</span>
  <span id="timer" style="font-size: 23px; color: #00d4ff;">Time: 00:00</span>
  </div>
  <div style="display:flex; gap:10px; justify-content:center; margin-bottom:12px;">
    <button id="easyBtn">Easy (9)</button>
    <button id="mediumBtn">Medium (16)</button>
    <button id="hardBtn">Hard (25)</button>
  </div>
  <span id="sp2">notice:you have only 90 secs</span>
  <h1>Memory Game 🧠</h1>
  <div class="game-board"></div>
  <button onclick="restart()">Restart</button>
  

  <script>


      // DOM refs
      const timerElement = document.getElementById("timer");
      const span = document.getElementById("span");
      const h3 = document.getElementById("h3");
      const gameBoard = document.querySelector('.game-board');
      const h1 = document.querySelector("h1");
      const sp2 = document.getElementById("sp2");

      // Controls
      const easyBtn = document.getElementById('easyBtn');
      const mediumBtn = document.getElementById('mediumBtn');
      const hardBtn = document.getElementById('hardBtn');

      // Game state
      let moves = 0;
      let score = 0;
      let minutes = 0, seconds = 0;
      let timer = null;
      let gameOverTimeout = null;
      let flippedCards = [];
      let matchedCards = [];
      let currentCount = 16; // default medium

      // A larger pool of emojis so we can support bigger boards (up to 26+ cards)
      const icons = ['⚽','⚾','🏀','🏐','🏈','🏉','🎱','🥎','🎾','🏓','🏸','🥏','🪀','🎯','🪁','🛹','🚲','🎳'];

      function updateTimerDisplay(){
        const m = String(minutes).padStart(2, '0');
        const s = String(seconds).padStart(2, '0');
        timerElement.textContent = `Time: ${m}:${s}`;
      }

      function startTimer(){
        clearInterval(timer);
        minutes = 0; seconds = 0;
        updateTimerDisplay();
        timer = setInterval(() => {
          seconds++;
          if (seconds === 60){ seconds = 0; minutes++; }
          updateTimerDisplay();
        }, 1000);
      }

      function shuffle(array){
        for (let i = array.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
      }

      function buildBoard(count) {
    // ensure even number of cards so pairs can be formed
    // changed behavior: if an odd count is requested, decrement to previous even (e.g., 9 -> 8, 25 -> 24)
        const evenCount = (count % 2 === 0) ? count : count - 1;
        const pairs = evenCount / 2;

        // prepare icons for pairs; if not enough icons, reuse from start (icons pool is large enough for requested sizes)
        let selected = icons.slice(0, pairs);
        // duplicate and shuffle
        let cardsArray = shuffle([...selected, ...selected]);

        // clear previous board and state
        clearInterval(gameOverTimeout);
        gameBoard.classList.remove('flex');
        gameBoard.innerHTML = '';
        flippedCards = [];
        matchedCards = [];
        moves = 0;
        score = 0;
        span.textContent = `moves: ${moves}`;
        h3.textContent = `Score: ${score}`;
        timerElement.style.display = "inline"
        sp2.style.display = "inline"
        h3.style.display = "inline"
        h1.style.display = "block"

  // choose columns to produce balanced rows and avoid a sparse last row
  // strategy: use floor(sqrt(n)) as a base row count and compute columns = ceil(n / baseRows)
  // this tends to produce grids like 8 => 4x2 instead of 3x3 which leaves an obvious gap
  const baseRows = Math.floor(Math.sqrt(evenCount)) || 1;
  const cols = Math.ceil(evenCount / baseRows);
  gameBoard.style.gridTemplateColumns = `repeat(${cols}, 4fr)`;

        // create cards
        cardsArray.forEach(icon => {
          const card = document.createElement('div');
          card.classList.add('card');
          card.innerHTML = `\n          <div class="front">${icon}</div>\n          <div class="back"></div>\n        `;
          gameBoard.appendChild(card);

          card.addEventListener('click', () => {
            if (flippedCards.length < 2 && !card.classList.contains('flip')) {
              card.classList.add('flip');
              card.classList.add('sc');
              flippedCards.push(card);
              moves += 1;
              span.textContent = `moves: ${moves}`;
            }

            if (flippedCards.length === 2) {
              const [first, second] = flippedCards;
              const firstIcon = first.querySelector('.front').textContent;
              const secondIcon = second.querySelector('.front').textContent;

              if (firstIcon === secondIcon) {
                setTimeout(()=>{
                  score += 10;
                  h3.textContent = `Score: ${score}`;
                  matchedCards.push(first, second);
                  first.classList.remove('sc');
                  second.classList.remove('sc');
                  flippedCards = [];

                  // win check
                  if (matchedCards.length === evenCount) {
                    clearInterval(timer);
                    gameBoard.innerHTML = `<div style="font-size: 24px; text-align: center;">You Win! <h4>Your score is ${score}</h4><p>Time taken: ${minutes} minutes & ${seconds} seconds</p></div>`;
                    gameBoard.classList.add('flex');
                    h3.style.display = "none";
                    h1.style.display = "none";
                    sp2.style.display = "none";
                    timerElement.style.display = "none";
                  }
                }, 500);
              } else {
                setTimeout(() => {
                  first.classList.remove('flip');
                  second.classList.remove('flip');
                  first.classList.remove('sc');
                  second.classList.remove('sc');
                  flippedCards = [];
                }, 700);
              }
            }
          });
        });

        // start/ reset timer
        startTimer();

        // Optional: keep the previous 91s 'game over' behavior but ensure only one timeout exists
        clearTimeout(gameOverTimeout);
        gameOverTimeout = setTimeout(()=>{
          clearInterval(timer); // Stop the timer
          gameBoard.innerHTML = `<div style="font-size: 24px; text-align: center;">Game Over! <h4>Your score is ${score}</h4><p>Time taken: ${minutes} minutes & ${seconds} seconds</p></div>`;
          gameBoard.classList.add('flex');
          h3.style.display = "none";
          h1.style.display = "none";
          sp2.style.display = "none";
          timerElement.style.display = "none";
        }, 91000);
      }

      // Difficulty button handlers
      easyBtn.addEventListener('click', () => { currentCount = 8; buildBoard(currentCount); });
      mediumBtn.addEventListener('click', () => { currentCount = 16; buildBoard(currentCount); });
      hardBtn.addEventListener('click', () => { currentCount = 24; buildBoard(currentCount); });

      // Restart button uses the current difficulty
      function restart(){
        buildBoard(currentCount);
        // restore displays
        h3.style.display = "inline";
        h1.style.display = "block";
        sp2.style.display = "inline";
        timerElement.style.display = "inline";
      }

      // wire restart from the button (keeps existing onclick handler in HTML)
      window.restart = restart;

      // initialize default (medium)
      buildBoard(currentCount);


    </script>
